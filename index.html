<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="envelope-wrapper" id="envelopeWrapper">
            
            <div class="envelope">
                <div class="flap"></div>
                <div class="pocket"></div>
                
                <div class="stamp" id="waxStamp">
                    <span class="initials">A&A</span>
                    <span class="click-text">Press to Open</span>
                </div>
            </div>

            <div class="invitation-card" id="invitationCard">
                <div class="card-content">
                    <h2>Save the Date</h2>
                    <p class="names">Abdullah & Ayesha</p>
                    <p class="details">Are getting married!</p>
                    <hr class="divider">
                    <p class="date">August 20, 2026</p>
                    <p class="venue">Zayani Majlis, Muharraq</p>
                    
                    <div class="actions">
                        <button class="btn">Get Directions</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
